name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: roboto-guilliman
  GCP_REGION: europe-west1
  ARTIFACT_REGISTRY: europe-west1-docker.pkg.dev/roboto-guilliman/roboto-guilliman
  PULUMI_STACK: main
  PLACEHOLDER_IMAGE: us-docker.pkg.dev/cloudrun/container/hello

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff
        run: poetry run ruff check roboto_guilliman tests

      - name: Pytest
        run: poetry run pytest -q

  build-and-deploy:
    name: Build and Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Load cached infra venv
        id: cached-infra-venv
        uses: actions/cache@v4
        with:
          path: infra/pulumi/.venv
          key: infra-venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('infra/pulumi/poetry.lock') }}

      - name: Install infra dependencies
        if: steps.cached-infra-venv.outputs.cache-hit != 'true'
        working-directory: infra/pulumi
        run: poetry install --no-interaction

      - name: Install Pulumi CLI
        uses: pulumi/setup-pulumi@v2

      - name: Bootstrap Pulumi stack (Artifact Registry + index)
        working-directory: infra/pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi stack select "${{ env.PULUMI_STACK }}" --create
          pulumi config set gcp:project "${{ env.GCP_PROJECT_ID }}"
          pulumi config set gcp:region "${{ env.GCP_REGION }}"
          if ! pulumi stack output cloud_run_uri >/dev/null 2>&1; then
            pulumi config set image "${{ env.PLACEHOLDER_IMAGE }}"
          fi
          pulumi up --yes

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}:latest
            ${{ env.ARTIFACT_REGISTRY }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy with Pulumi
        working-directory: infra/pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi config set image "${{ env.ARTIFACT_REGISTRY }}:sha-${{ github.sha }}"
          pulumi up --yes

      - name: Smoke test
        working-directory: infra/pulumi
        run: |
          URI=$(pulumi stack output cloud_run_uri)
          for i in $(seq 1 24); do
            if curl -sf "${URI}/health" | grep -q '"status":"ok"'; then
              echo "Health check passed at ${URI}"
              exit 0
            fi
            echo "Waiting for Cloud Run cold start... ($i/24)"
            sleep 5
          done
          echo "Smoke test failed"
          exit 1
